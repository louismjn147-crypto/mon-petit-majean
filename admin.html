<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Administration - Mon Petit Majean</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
</head>

<body>

    <div class="admin-login">

        <h1>👑 Administration</h1>

        <input
            type="password"
            id="admin-password"
            placeholder="Mot de passe">

        <button id="login-admin">
            Connexion
        </button>

    </div>

   <div
    class="admin-panel"
    id="admin-panel"
    style="display:none;">

    <h2>👑 Tableau de bord</h2>

    <h3>➕ Ajouter un match</h3>

    <input
        type="text"
        id="home-team"
        placeholder="Équipe domicile">

    <input
        type="text"
        id="away-team"
        placeholder="Équipe extérieure">

    <input
        type="date"
        id="match-date">

    <input
        type="time"
        id="match-time">

       <label for="home-odds">Cote victoire domicile</label>
<input
    id="home-odds"
    type="number"
    min="1"
    step="1"
    placeholder="Exemple : 210"
>

<label for="draw-odds">Cote match nul</label>
<input
    id="draw-odds"
    type="number"
    min="1"
    step="1"
    placeholder="Exemple : 380"
>

<label for="away-odds">Cote victoire extérieur</label>
<input
    id="away-odds"
    type="number"
    min="1"
    step="1"
    placeholder="Exemple : 295"
>

    <button id="add-match">
        Ajouter le match
    </button

        <hr>

<h3>📋 Matchs enregistrés</h3>

<div id="matches-list"></div>

</div>

</div>

    <script src="admin.js?v=2"></script>

</body>

</html>
