<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Administration - Mon Petit Majean</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
</head>

<body>

    <div class="admin-login">

        <h1>👑 Administration</h1>

        <input
            type="password"
            id="admin-password"
            placeholder="Mot de passe">

        <button id="login-admin">
            Connexion
        </button>

    </div>

   <div
    class="admin-panel"
    id="admin-panel"
    style="display:none;">

    <h2>👑 Tableau de bord</h2>

    <h3>➕ Ajouter un match</h3>

    <input
        type="text"
        id="home-team"
        placeholder="Équipe domicile">

    <input
        type="text"
        id="away-team"
        placeholder="Équipe extérieure">

    <input
        type="date"
        id="match-date">

    <input
        type="time"
        id="match-time">

    <button id="add-match">
        Ajouter le match
    </button>

</div>

    <script src="admin.js"></script>

</body>

</html>
